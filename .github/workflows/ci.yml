name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: './bin'
          severity: warning

      - name: Verify scripts are executable in repo
        run: |
          test -f bin/pdf-unlock
          test -f bin/pdf-password
          test -f bin/pdf-unlock-finder
          test -f install.sh
          test -f uninstall.sh
